<div class="container">
    <div class="row">
        <div class="col-md-8">
          <app-product-form
          (EmitUpdate)="Onupdate($event)"
          [editObj]="editObj"
          (emitAddProd)="onAddprod($event)"
          ></app-product-form>
        </div>
    </div>
    <div class="row">
        <div class="col-md-12">
           <app-product-post
           (emitEditObj)="onEdit($event)"
           (EmitRemoveid)="Onremove($event)"
           [getprodArr]="prodArr"
           ></app-product-post>
        </div>
    </div>
</div>
