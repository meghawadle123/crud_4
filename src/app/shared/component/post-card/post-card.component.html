<div class="container mt-5" *ngIf="getArr.length>0;else nopost">
    <div class="row">
        <div class="col-md-4 mb-4" *ngFor="let post of getArr;trackBy:trackByfun">
            <mat-card>
                <mat-card-header>
                    <mat-card-title>
                       {{post.title}}
                    </mat-card-title>
                </mat-card-header>
                <mat-card-content>
                    {{post.body}}
                </mat-card-content>
                <mat-card-actions class="d-flex justify-content-between">
                   <button 
                   (click)="onEdit(post)"
                   mat-mini-fab color="primary">
                      <mat-icon>edit</mat-icon>
                   </button>

                   <button 
                   (click)="onRemove(post.id)"
                   mat-mini-fab color="warn">
                      <mat-icon>delete</mat-icon>
                   </button>
                </mat-card-actions>
            </mat-card>
        </div>
    </div>
</div>

<ng-template #nopost>
    <p>post is not Available</p>
</ng-template>
