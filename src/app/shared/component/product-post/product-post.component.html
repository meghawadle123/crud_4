<div class="container mt-5" *ngIf="getprodArr.length>0;else noProd">
    <div class="row">
        <div class="col-md-4 mb-4" *ngFor="let prod of getprodArr;trackBy:trackByfun">
            <mat-card>
                <mat-card-header>
                    <mat-card-title>
                      {{prod.productName}}
                    </mat-card-title>
                </mat-card-header>
                <img [src]="prod.imageUrl" [alt]="prod.imageUrl" style="width: 100%; height: 350px; object-fit: cover;">
                <mat-card-content>
                     <p>Brand:{{prod.brand}}</p>
                     <p>Price:{{prod.price}}</p>
                </mat-card-content>
                <mat-card-actions class="d-flex justify-content-between">
                    <button 
                    (click)="onEdit(prod)"
                    mat-mini-fab color="primary">
                        <mat-icon>edit</mat-icon>
                    </button>

                    <button
                    (click)="onRemove(prod.productId)"
                     mat-mini-fab color="warn">
                        <mat-icon>delete</mat-icon>
                    </button>
                </mat-card-actions>
            </mat-card>
        </div>
    </div>
</div>

<ng-template #noProd>
    <p>No data Availabel</p>
</ng-template>
