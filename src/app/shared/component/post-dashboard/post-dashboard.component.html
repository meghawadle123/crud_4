<div class="container">
    <div class="row">
        <div class="col-md-8 offset-2">
           <app-post-form
           (EmitUpdate)="onUpdate($event)"
           [EditObj]="EditObj"
           (EmitAddPost)="onAddpost($event)"
           ></app-post-form>
        </div>
    </div>

    <div class="row">
        <div class="col-md-12">
           <app-post-card
           
           (emitEditObj)="onEdit($event)"
           (emitRemoveId)="onremove($event)"
           [getArr]="postArr"
           ></app-post-card>
        </div>
    </div>
</div>
