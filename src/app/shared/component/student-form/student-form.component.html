<form #stdForm="ngForm" (ngSubmit)="onAddStudent()">

    <div class="form-group">
        <label for="fname">fname</label>
        <input
        required
        ngModel
        #fname="ngModel"
        name="fname"
         type="text" class="form-control">
    </div>

    <div class="form-group">
        <label for="lname">lname</label>
        <input
        required
        ngModel
        #lname="ngModel"
        name="lname"
         type="text" class="form-control">
    </div>

    <div class="form-group">
        <label for="email">email</label>
        <input
        required
        ngModel
        #email="ngModel"
        name="email"
         type="text" class="form-control">
    </div>

    <div class="form-group">
        <label for="contact">contact</label>
        <input
        required
        ngModel
        #contact="ngModel"
        name="contact"
         type="text" class="form-control">
    </div>

    <button
    *ngIf="!IsInEditMode"
    [disabled]="stdForm.invalid"
     mat-raised-button color="primary">Add button</button>
    <button 
    *ngIf="IsInEditMode"
    (click)="onUpdate()"
    mat-raised-button color="primary">update button</button>
</form>
